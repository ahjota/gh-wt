name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  shell-lint:
    name: shell lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: bash -n (syntax)
        timeout-minutes: 5
        run: |
          set -euo pipefail
          shopt -s nullglob
          bash -n gh-wt
          for f in lib/*.sh; do
            bash -n "$f"
          done
      - name: shellcheck
        timeout-minutes: 5
        run: |
          set -euo pipefail
          shopt -s nullglob
          shellcheck --version
          shellcheck -S warning gh-wt lib/*.sh
